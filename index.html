:root{
--bg:#000;
--panel:#ffffff;
--border:#d8deea;
--text:#1f2937;
--muted:#6b7280;
--player-bg:#eef5ff;
--player-border:#93c5fd;
--banker-bg:#fff1f2;
--banker-border:#fda4af;
--active:#fff7cc;
--active-border:#f59e0b;
--blue:#2563eb;
--red:#dc2626;
--green:#059669;
--orange:#f97316;
--soft:#eef2f7;
--soft-border:#cbd5e1;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
margin:0;
min-height:100%;
background:var(--bg);
color:var(--text);
font-family:Arial,"Microsoft JhengHei",sans-serif;
}
body{
padding-top:env(safe-area-inset-top);
padding-bottom:env(safe-area-inset-bottom);
}
.container{max-width:920px;margin:0 auto;padding:12px}
.logo-wrap{display:flex;justify-content:center;align-items:center;margin-bottom:12px}
.logo{
display:flex;align-items:center;gap:10px;padding:10px 14px;border:1px solid #2a2a2a;border-radius:16px;
background:linear-gradient(180deg,#0f172a 0%,#111827 100%);box-shadow:0 10px 30px rgba(0,0,0,.35)
}
.logo-mark{
width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;
font-weight:900;font-size:22px;color:#fff;background:linear-gradient(135deg,var(--red),var(--green))
}
.logo-title{color:#fff;font-size:20px;font-weight:900}
.logo-sub{color:#94a3b8;font-size:11px;font-weight:700;letter-spacing:1.6px;margin-top:3px}
.top-box{display:flex;gap:12px}
.side{flex:1;border-radius:16px;padding:12px;border:2px solid transparent}
.player-side{background:var(--player-bg);border-color:var(--player-border)}
.banker-side{background:var(--banker-bg);border-color:var(--banker-border)}
.title{font-size:18px;font-weight:700;text-align:center;margin-bottom:10px}
.sub-title{display:block;font-size:12px;color:var(--muted);font-weight:600;margin-top:3px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cell{
height:62px;border:2px solid #d6dce8;border-radius:14px;background:rgba(255,255,255,.92);
display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;cursor:pointer;user-select:none
}
.cell.empty::after{font-size:12px;font-weight:600;color:#94a3b8}
.cell.p1.empty::after{content:'P1'}
.cell.p2.empty::after{content:'P2'}
.cell.p3.empty::after{content:'P3'}
.cell.b1.empty::after{content:'B1'}
.cell.b2.empty::after{content:'B2'}
.cell.b3.empty::after{content:'B3'}
.span2{grid-column:1 / span 2}
.active{background:var(--active);border-color:var(--active-border);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.card{
margin-top:12px;background:linear-gradient(180deg,#fff 0%,#f8fafc 100%);border:1px solid var(--border);
border-radius:18px;padding:12px;box-shadow:0 8px 24px rgba(15,23,42,.08)
}
.row{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.score-main,.control-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.round-wrap{
display:flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--soft-border);
background:#f8fafc;border-radius:10px
}
.label{font-size:12px;font-weight:700;color:#64748b}
.round-input{
width:78px;border:1px solid #cbd5e1;border-radius:8px;padding:6px 8px;font-size:14px;
-webkit-appearance:none;appearance:none
}
.score-badge{
min-width:92px;padding:8px 12px;border-radius:999px;font-size:15px;font-weight:700;text-align:center;background:#eef2ff
}
.score-badge.player{color:var(--blue)}
.score-badge.banker{color:var(--red);background:#fff1f2}
.winner-text{font-size:24px;font-weight:800}
.winner-player{color:var(--blue)}
.winner-banker{color:var(--red)}
.winner-tie{color:var(--green)}
.btn{
border:1px solid var(--soft-border);background:var(--soft);color:#475569;border-radius:10px;padding:8px 11px;
font-size:13px;font-weight:700;cursor:pointer
}
.btn-next{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
.btn-history{background:#fff1f2;color:#b91c1c;border-color:#fecdd3}
.detail-text{margin-top:8px;font-size:14px;line-height:1.45;color:#334155}
.buttons{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;width:100%}
button.key{
border:1px solid #cfd8e3;background:#fff;border-radius:12px;padding:10px 4px;font-size:15px;font-weight:700;
color:#111827;cursor:pointer;min-height:46px
}
.skip-key{background:#f3f4f6 !important;color:#4b5563 !important}
.pro-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:10px}
.line-row{font-size:24px;font-weight:900;line-height:1.4;word-break:break-word}
.line-sub{font-size:13px;color:#334155;line-height:1.35;word-break:break-word}
.m-label{color:var(--red)}
.t-label{color:var(--green)}
.r-label{color:var(--orange)}
.stats-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.stat-box{
border-radius:12px;padding:8px 6px;text-align:center;border:1px solid #e5e7eb;background:#fff;position:relative
}
.stat-name{font-size:11px;font-weight:800;color:#64748b;margin-bottom:4px}
.stat-rate{font-size:15px;font-weight:900;line-height:1}
.stat-extra{font-size:11px;color:#64748b;margin-top:4px}
.stat-red .stat-rate{color:var(--red)}
.stat-green .stat-rate{color:var(--green)}
.stat-orange .stat-rate{color:var(--orange)}
.rate-strong{box-shadow:0 0 0 2px rgba(245,158,11,.18);border-color:#fcd34d}
.rate-mid{box-shadow:0 0 0 2px rgba(59,130,246,.10)}
.rate-low{opacity:.82}
.best-stat{box-shadow:0 0 0 3px rgba(245,158,11,.22),0 8px 16px rgba(245,158,11,.12);border-color:#f59e0b !important}
.signal-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.signal-box{
border-radius:14px;padding:10px;border:1px solid #e5e7eb;background:#fff;min-height:92px
}
.signal-name{font-size:12px;font-weight:900;margin-bottom:6px}
.signal-red .signal-name{color:var(--red)}
.signal-green .signal-name{color:var(--green)}
.signal-orange .signal-name{color:var(--orange)}
.signal-pick{font-size:22px;font-weight:900;margin-bottom:6px}
.signal-meta{font-size:12px;line-height:1.35;color:#475569}
.heat-box{
margin-top:8px;border:1px solid #e5e7eb;border-radius:12px;padding:10px;background:#fff;
font-size:14px;font-weight:800;color:#334155
}
.history-list{margin-top:10px;max-height:360px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.history-empty{color:var(--muted);font-size:14px;padding:8px 0}
.history-item{border:1px solid var(--border);border-radius:14px;padding:10px;background:#fff;position:relative}
.history-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;flex-wrap:wrap}
.history-main{
display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;flex:1 1 auto;min-width:0;padding-right:100px
}
.history-cards{font-size:13px;line-height:1.45;min-width:116px}
.history-smr{color:#94a3b8;font-size:12px;line-height:1.3;display:flex;gap:8px;flex-wrap:wrap;flex:1 1 auto;min-width:0}
.history-smr>div{padding:4px 8px;border:1px solid #e2e8f0;border-radius:10px;background:#f8fafc;white-space:nowrap}
.history-result{
font-size:13px;font-weight:800;border-radius:999px;padding:6px 10px;background:#f8fafc;flex:0 0 auto;position:absolute;top:10px;right:10px
}
.hit{color:#166534;background:#dcfce7}
.miss{color:#b91c1c;background:#fee2e2}
.draw{color:#6b7280;background:#f3f4f6}
.status-hit{color:#166534;font-weight:700}
.status-miss{color:#b91c1c;font-weight:700}
.status-draw{color:#6b7280;font-weight:700}
@media (max-width:500px){
.container{padding:6px}
.logo{padding:8px 10px;border-radius:14px}
.logo-mark{width:34px;height:34px;font-size:18px;border-radius:10px}
.logo-title{font-size:16px}
.logo-sub{font-size:9px}
.top-box{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.side{padding:8px 6px;border-radius:12px}
.title{font-size:14px;margin-bottom:6px}
.sub-title{font-size:10px}
.grid{gap:6px}
.cell{height:46px;font-size:17px;border-radius:10px}
.cell.empty::after{font-size:10px}
.card{margin-top:10px;padding:10px;border-radius:14px}
.winner-text{font-size:16px}
.score-badge{min-width:64px;font-size:11px;padding:5px 7px}
.detail-text{font-size:11px}
.round-wrap{padding:4px 6px;gap:4px;border-radius:8px}
.label{font-size:11px}
.round-input{width:54px;font-size:11px;padding:4px 5px}
button.key{min-height:38px;padding:6px 2px;font-size:11px;border-radius:9px}
.btn,.btn-next,.btn-history{padding:5px 7px;font-size:11px;border-radius:8px}
.line-row{font-size:17px;line-height:1.35}
.line-sub{font-size:10px;line-height:1.25}
.stats-row,.signal-grid{gap:4px}
.stat-box,.signal-box{border-radius:10px;padding:6px 4px}
.stat-name{font-size:8px}
.stat-rate{font-size:11px}
.stat-extra{font-size:8px}
.signal-name{font-size:9px}
.signal-pick{font-size:16px}
.signal-meta{font-size:9px;line-height:1.25}
.heat-box{font-size:11px;padding:8px}
.history-list{margin-top:8px;max-height:280px;gap:6px}
.history-item{padding:9px;border-radius:12px}
.history-top{gap:4px}
.history-main{width:100%;gap:6px;flex-direction:column;align-items:stretch;padding-right:0;padding-top:22px}
.history-cards{font-size:12px;line-height:1.28;min-width:0}
.history-smr{
display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:2px;font-size:9px;line-height:1.08;width:100%
}
.history-smr>div{
min-width:0;text-align:center;padding:4px 2px;border-radius:7px;white-space:nowrap;overflow:hidden
}
.history-result{top:8px;right:8px;font-size:11px;padding:5px 8px}
}
</style>
</head>
<body>
<div class="container">
  <div class="logo-wrap">
    <div class="logo">
      <div class="logo-mark">M</div>
      <div class="logo-text">
        <div class="logo-title">Baccarat MTR</div>
        <div class="logo-sub">PRO SYSTEM</div>
      </div>
    </div>
  </div>

  <div class="top-box">
    <div class="side player-side">
      <div class="title">PLAYER<span class="sub-title">閒家</span></div>
      <div class="grid">
        <div class="cell empty p1" data-index="0"></div>
        <div class="cell empty p2" data-index="1"></div>
        <div class="cell empty p3 span2" data-index="4"></div>
      </div>
    </div>
    <div class="side banker-side">
      <div class="title">BANKER<span class="sub-title">莊家</span></div>
      <div class="grid">
        <div class="cell empty b1" data-index="2"></div>
        <div class="cell empty b2" data-index="3"></div>
        <div class="cell empty b3 span2" data-index="5"></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div class="score-main">
        <div class="score-badge player" id="playerScore">閒 0</div>
        <div class="score-badge banker" id="bankerScore">莊 0</div>
        <div class="winner-text winner-tie" id="winnerText">和局</div>
      </div>
      <div class="control-row">
        <div class="round-wrap">
          <span class="label">局數</span>
          <input class="round-input" id="roundInput" type="number" min="1" step="1" inputmode="numeric">
        </div>
        <button class="btn btn-next" type="button" id="nextBtn">下一局</button>
        <button class="btn" type="button" id="clearBoardBtn">清除本局</button>
      </div>
    </div>
    <div class="detail-text">
      <div class="label">判斷資訊</div>
      <div id="detailText">請先輸入局數，再依序輸入牌面</div>
    </div>
  </div>

  <div class="card">
    <div class="label">牌面鍵</div>
    <div class="buttons" id="cardButtons">
      <button class="key" type="button" data-card="A">A</button>
      <button class="key" type="button" data-card="2">2</button>
      <button class="key" type="button" data-card="3">3</button>
      <button class="key" type="button" data-card="4">4</button>
      <button class="key" type="button" data-card="5">5</button>
      <button class="key" type="button" data-card="6">6</button>
      <button class="key" type="button" data-card="7">7</button>
      <button class="key" type="button" data-card="8">8</button>
      <button class="key" type="button" data-card="9">9</button>
      <button class="key" type="button" data-card="10">10</button>
      <button class="key" type="button" data-card="J">J</button>
      <button class="key" type="button" data-card="Q">Q</button>
      <button class="key" type="button" data-card="K">K</button>
      <button class="key skip-key" type="button" id="skipBtn">不補</button>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div><div class="label">MTR 職業版分析</div></div>
    </div>
    <div class="pro-grid">
      <div id="linePredict" class="line-row">M:-　T:-　R:-</div>
      <div id="linePredictMeta" class="line-sub">M點差:-/公牌:-｜T真數:-/建議:-｜R尾數:-/翻邊:-</div>

      <div class="signal-grid">
        <div class="signal-box signal-red">
          <div class="signal-name">M 矩陣</div>
          <div class="signal-pick" id="mSignal">-</div>
          <div class="signal-meta" id="mMetaBox">點差:-<br>公牌奇偶:-</div>
        </div>
        <div class="signal-box signal-green">
          <div class="signal-name">T 真數</div>
          <div class="signal-pick" id="tSignal">-</div>
          <div class="signal-meta" id="tMetaBox">真數:-<br>建議:-</div>
        </div>
        <div class="signal-box signal-orange">
          <div class="signal-name">R 尾數</div>
          <div class="signal-pick" id="rSignal">-</div>
          <div class="signal-meta" id="rMetaBox">尾數:-<br>翻邊:-</div>
        </div>
      </div>

      <div class="heat-box" id="heatBox">熱區判斷：等待資料</div>

      <div id="lineStats" class="stats-row">
        <div class="stat-box stat-red"><div class="stat-name">M勝率</div><div class="stat-rate">0%</div><div class="stat-extra">0/0</div></div>
        <div class="stat-box stat-green"><div class="stat-name">T勝率</div><div class="stat-rate">0%</div><div class="stat-extra">0/0</div></div>
        <div class="stat-box stat-orange"><div class="stat-name">R勝率</div><div class="stat-rate">0%</div><div class="stat-extra">0/0</div></div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="row">
      <div>
        <div class="label">歷史紀錄</div>
        <div style="font-size:13px;color:#475569;">最新在最上，可下拉查看</div>
      </div>
      <button class="btn btn-history" type="button" id="clearHistoryBtn">清除歷史</button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>
</div>

<script>
(function () {
'use strict';
const STORAGE_KEY = 'baccarat_mtr_pro_v1';

let values = ['', '', '', '', '', ''];
const order = [0, 1, 2, 3, 4, 5];
let currentStep = 0;
let selectedIndex = null;
let historyData = [];
let pendingPrediction = null;

const cells = Array.prototype.slice.call(document.querySelectorAll('.cell'));
const roundInputEl = document.getElementById('roundInput');
const cardButtonsEl = document.getElementById('cardButtons');
const nextBtn = document.getElementById('nextBtn');
const clearBoardBtn = document.getElementById('clearBoardBtn');
const skipBtn = document.getElementById('skipBtn');
const clearHistoryBtn = document.getElementById('clearHistoryBtn');

const playerScoreEl = document.getElementById('playerScore');
const bankerScoreEl = document.getElementById('bankerScore');
const winnerTextEl = document.getElementById('winnerText');
const detailTextEl = document.getElementById('detailText');
const linePredictEl = document.getElementById('linePredict');
const linePredictMetaEl = document.getElementById('linePredictMeta');
const lineStatsEl = document.getElementById('lineStats');
const historyListEl = document.getElementById('historyList');
const heatBoxEl = document.getElementById('heatBox');
const mSignalEl = document.getElementById('mSignal');
const tSignalEl = document.getElementById('tSignal');
const rSignalEl = document.getElementById('rSignal');
const mMetaBoxEl = document.getElementById('mMetaBox');
const tMetaBoxEl = document.getElementById('tMetaBox');
const rMetaBoxEl = document.getElementById('rMetaBox');

function getPickValueHtml(p) {
  if (p === '閒') return '<span style="color:#2563eb;font-weight:900;">閒</span>';
  if (p === '莊') return '<span style="color:#dc2626;font-weight:900;">莊</span>';
  if (p === '-' || p === '觀望' || p === '待輸入') return '<span style="color:#6b7280;font-weight:900;">' + p + '</span>';
  return '<span style="color:#6b7280;font-weight:900;">' + p + '</span>';
}
function getPickTextHtml(p) {
  if (p === '閒') return '<span style="color:#2563eb;">閒</span>';
  if (p === '莊') return '<span style="color:#dc2626;">莊</span>';
  return '<span style="color:#6b7280;">' + p + '</span>';
}
function colorPick(name, p) {
  const map = { M: 'm-label', T: 't-label', R: 'r-label' };
  return '<span class="' + map[name] + '">' + name + ':</span>' + getPickValueHtml(p);
}
function getStatTierClass(rate) {
  if (rate >= 60) return 'rate-strong';
  if (rate >= 45) return 'rate-mid';
  return 'rate-low';
}
function saveToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      values: values,
      currentStep: currentStep,
      selectedIndex: selectedIndex,
      historyData: historyData,
      pendingPrediction: pendingPrediction,
      roundInput: roundInputEl.value || ''
    }));
  } catch (e) {}
}
function loadFromStorage() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    if (Array.isArray(data.values) && data.values.length === 6) values = data.values;
    currentStep = Number.isInteger(data.currentStep) ? data.currentStep : 0;
    selectedIndex = Number.isInteger(data.selectedIndex) ? data.selectedIndex : null;
    historyData = Array.isArray(data.historyData) ? data.historyData : [];
    pendingPrediction = data.pendingPrediction || null;
    roundInputEl.value = data.roundInput || '';
  } catch (e) {}
}
function getRoundNumber() {
  const n = parseInt(roundInputEl.value, 10);
  return Number.isFinite(n) && n > 0 ? n : null;
}
function getDecksByRound(roundNo) {
  if (roundNo === null) return null;
  if (roundNo <= 10) return 8;
  if (roundNo <= 20) return 7;
  if (roundNo <= 30) return 6;
  if (roundNo <= 40) return 5;
  if (roundNo <= 50) return 4;
  return 3;
}
function getValue(card) {
  if (!card) return 0;
  if (card === 'A') return 1;
  if (card === '10' || card === 'J' || card === 'Q' || card === 'K') return 0;
  return parseInt(card, 10) || 0;
}
function getTrueCountWeight(card) {
  if (!card) return 0;
  if (['A','2','7','8','9'].indexOf(card) >= 0) return 1;
  if (['3','4','5','6'].indexOf(card) >= 0) return -1;
  return 0;
}
function getCards(arr) { return arr.filter(Boolean); }
function getActualResultLabel(playerTotal, bankerTotal) {
  if (playerTotal > bankerTotal) return '閒';
  if (bankerTotal > playerTotal) return '莊';
  return '和';
}
function getWinnerTextClass(result) {
  if (result === '閒贏') return 'winner-player';
  if (result === '莊贏') return 'winner-banker';
  return 'winner-tie';
}
function getHistoryStatus(prediction, actual) {
  if (actual === '和') return '-';
  if (prediction !== '閒' && prediction !== '莊') return '-';
  return prediction === actual ? '準' : '失敗';
}
function isNatural(p2, b2) { return p2 >= 8 || b2 >= 8; }
function shouldPlayerDraw(p2) { return p2 <= 5; }
function shouldBankerDraw(b2, playerThird, playerDrew) {
  if (!playerDrew) return b2 <= 5;
  const pt = getValue(playerThird);
  if (b2 <= 2) return true;
  if (b2 === 3) return pt !== 8;
  if (b2 === 4) return pt >= 2 && pt <= 7;
  if (b2 === 5) return pt >= 4 && pt <= 7;
  if (b2 === 6) return pt === 6 || pt === 7;
  return false;
}
function evaluateM(playerCards, bankerCards, allCards) {
  if (playerCards.length < 2 || bankerCards.length < 2) {
    return { pick: '待輸入', meta: '點差：-\\n公牌奇偶：-' };
  }
  const playerTotalRaw = playerCards.reduce(function (s, c) { return s + getValue(c); }, 0);
  const bankerTotalRaw = bankerCards.reduce(function (s, c) { return s + getValue(c); }, 0);
  const diff = playerTotalRaw - bankerTotalRaw;
  const sign1 = diff >= 0 ? '正' : '負';
  const publicCount = allCards.filter(function (c) { return ['10','J','Q','K'].indexOf(c) >= 0; }).length;
  const sign2 = publicCount % 2 === 0 ? '正' : '負';
  const finalSign = sign1 === sign2 ? '正' : '負';
  return {
    pick: finalSign === '正' ? '閒' : '莊',
    meta: '點差：' + diff + '\\n公牌奇偶：' + (publicCount % 2 === 0 ? '正' : '負')
  };
}
function evaluateTrueCount(allCards, roundNo) {
  if (allCards.length === 0) return { pick: '待輸入', meta: '真數：-\\n建議：-' };
  const decks = getDecksByRound(roundNo);
  if (!decks) return { pick: '待輸入', meta: '真數：-\\n建議：請輸入局數' };
  const total = allCards.reduce(function (sum, card) { return sum + getTrueCountWeight(card); }, 0);
  const trueCount = total / decks;
  let pick = '觀望';
  if (trueCount > 0) pick = '閒';
  else if (trueCount < 0) pick = '莊';
  const absTC = Math.abs(trueCount);
  let advice = '觀望';
  if (absTC > 0.6) advice = '下大注';
  else if (absTC > 0.5) advice = '小下注';
  else if (absTC >= 0.35 && absTC <= 0.5) advice = '看一把';
  else if (absTC < 0.25) advice = '下大注';
  else advice = '小下注';
  if (pick === '觀望') advice = '觀望';
  return { pick: pick, meta: '真數：' + trueCount.toFixed(2) + '\\n建議：' + advice };
}
function evaluateR(playerCards, bankerCards, allCards) {
  if (playerCards.length < 2 || bankerCards.length < 2) {
    return { pick: '待輸入', meta: '尾數：-\\n翻邊：-', flip: false };
  }
  const playerRaw = playerCards.reduce(function (s, c) { return s + getValue(c); }, 0);
  const bankerRaw = bankerCards.reduce(function (s, c) { return s + getValue(c); }, 0);
  const tail = (playerRaw % 10) + (bankerRaw % 10);
  const publicCount = allCards.filter(function (c) { return ['10','J','Q','K'].indexOf(c) >= 0; }).length;
  const flip = allCards.length === 5 || allCards.length === 6 || (allCards.length === 4 && publicCount === 0);
  let pick = tail === 19 ? '閒' : '莊';
  if (flip) pick = pick === '閒' ? '莊' : '閒';
  return { pick: pick, meta: '尾數：' + tail + '\\n翻邊：' + (flip ? '是' : '否'), flip: flip };
}
function getRoundState() {
  const playerCards = getCards([values[0], values[1], values[4]]);
  const bankerCards = getCards([values[2], values[3], values[5]]);
  const allCards = playerCards.concat(bankerCards);
  const roundNo = getRoundNumber();
  const p2 = (getValue(values[0]) + getValue(values[1])) % 10;
  const b2 = (getValue(values[2]) + getValue(values[3])) % 10;
  const playerThird = values[4] || null;
  const bankerThird = values[5] || null;
  let info = roundNo ? '請依序輸入牌面' : '請先輸入局數';
  if (roundNo && values[0] && values[1] && values[2] && values[3]) {
    if (isNatural(p2, b2)) {
      info = '天牌（不補）';
    } else {
      info = '';
      if (playerThird === null) info += shouldPlayerDraw(p2) ? '閒應補牌 ' : '閒不補 ';
      if (bankerThird === null) {
        if (playerThird === null && shouldPlayerDraw(p2)) info += '莊待閒第三張後判定';
        else info += shouldBankerDraw(b2, playerThird, playerThird !== null) ? '莊應補牌' : '莊不補';
      }
      if (!info.trim()) info = '本局已輸入完成';
    }
  }
  const hasEnough = playerCards.length >= 2 && bankerCards.length >= 2;
  const playerTotal = hasEnough ? playerCards.reduce(function (s, c) { return s + getValue(c); }, 0) % 10 : null;
  const bankerTotal = hasEnough ? bankerCards.reduce(function (s, c) { return s + getValue(c); }, 0) % 10 : null;
  const actual = hasEnough ? getActualResultLabel(playerTotal, bankerTotal) : '-';
  const state = {
    playerCards: playerCards, bankerCards: bankerCards, allCards: allCards, playerTotal: playerTotal, bankerTotal: bankerTotal,
    actual: actual, info: info, roundNo: roundNo
  };
  state.m = evaluateM(playerCards, bankerCards, allCards);
  state.t = evaluateTrueCount(allCards, roundNo);
  state.r = evaluateR(playerCards, bankerCards, allCards);
  return state;
}
function calcRate(key) {
  const valid = historyData.filter(function (item) { return item.actual !== '和' && item[key + 'Status'] !== '-'; });
  const hit = valid.filter(function (item) { return item[key + 'Status'] === '準'; }).length;
  const total = valid.length;
  return { hit: hit, total: total, rate: total === 0 ? 0 : Math.round((hit / total) * 100) };
}
function calcRecentRate(key, count) {
  const valid = historyData.filter(function (item) { return item.actual !== '和' && item[key + 'Status'] !== '-'; }).slice(0, count);
  const hit = valid.filter(function (item) { return item[key + 'Status'] === '準'; }).length;
  const total = valid.length;
  return total === 0 ? 0 : Math.round((hit / total) * 100);
}
function formatPredictMeta(mMeta, tMeta, rMeta) {
  const mParts = String(mMeta || '點差：-\\n公牌奇偶：-').split('\\n');
  const tParts = String(tMeta || '真數：-\\n建議：-').split('\\n');
  const rParts = String(rMeta || '尾數：-\\n翻邊：-').split('\\n');
  return 'M點差:' + (mParts[0] || '點差：-').replace('點差：', '') +
    '/公牌:' + (mParts[1] || '公牌奇偶：-').replace('公牌奇偶：', '') +
    '｜T真數:' + (tParts[0] || '真數：-').replace('真數：', '') +
    '/建議:' + (tParts[1] || '建議：-').replace('建議：', '') +
    '｜R尾數:' + (rParts[0] || '尾數：-').replace('尾數：', '') +
    '/翻邊:' + (rParts[1] || '翻邊：-').replace('翻邊：', '');
}
function renderPredict(state) {
  linePredictEl.innerHTML = colorPick('M', state.m.pick) + '　' + colorPick('T', state.t.pick) + '　' + colorPick('R', state.r.pick);
  linePredictMetaEl.textContent = formatPredictMeta(state.m.meta, state.t.meta, state.r.meta);

  const mParts = String(state.m.meta).split('\\n');
  const tParts = String(state.t.meta).split('\\n');
  const rParts = String(state.r.meta).split('\\n');

  mSignalEl.innerHTML = getPickTextHtml(state.m.pick);
  tSignalEl.innerHTML = getPickTextHtml(state.t.pick);
  rSignalEl.innerHTML = getPickTextHtml(state.r.pick);

  mMetaBoxEl.innerHTML = (mParts[0] || '點差：-') + '<br>' + (mParts[1] || '公牌奇偶：-');
  tMetaBoxEl.innerHTML = (tParts[0] || '真數：-') + '<br>' + (tParts[1] || '建議：-');
  rMetaBoxEl.innerHTML = (rParts[0] || '尾數：-') + '<br>' + (rParts[1] || '翻邊：-');
}
function renderHeat() {
  const m = calcRate('m');
  const t = calcRate('t');
  const r = calcRate('r');
  const stats = [
    { name: 'M', rate: m.rate, recent: calcRecentRate('m', 10) },
    { name: 'T', rate: t.rate, recent: calcRecentRate('t', 10) },
    { name: 'R', rate: r.rate, recent: calcRecentRate('r', 10) }
  ];
  const maxRate = Math.max.apply(null, stats.map(function(s){ return s.rate; }));
  const leaders = stats.filter(function(s){ return s.rate === maxRate && maxRate > 0; });
  if (leaders.length === 0) {
    heatBoxEl.textContent = '熱區判斷：等待資料';
    return;
  }
  const leaderNames = leaders.map(function(s){ return s.name; }).join(' / ');
  const detail = leaders.map(function(s){ return s.name + ' 近期10局 ' + s.recent + '%'; }).join(' ｜ ');
  heatBoxEl.textContent = '熱區判斷：' + leaderNames + ' 發威中｜' + detail;
}
function renderStats() {
  const m = calcRate('m');
  const t = calcRate('t');
  const r = calcRate('r');
  const stats = [
    { cls: 'stat-red', name: 'M勝率', rate: m.rate, hit: m.hit, total: m.total },
    { cls: 'stat-green', name: 'T勝率', rate: t.rate, hit: t.hit, total: t.total },
    { cls: 'stat-orange', name: 'R勝率', rate: r.rate, hit: r.hit, total: r.total }
  ];
  const maxRate = Math.max.apply(null, stats.map(function(item){ return item.rate; }));
  lineStatsEl.innerHTML = stats.map(function(item) {
    const bestClass = item.rate === maxRate && maxRate > 0 ? ' best-stat' : '';
    return '<div class="stat-box ' + item.cls + ' ' + getStatTierClass(item.rate) + bestClass + '">' +
      '<div class="stat-name">' + item.name + '</div>' +
      '<div class="stat-rate">' + item.rate + '%</div>' +
      '<div class="stat-extra">' + item.hit + '/' + item.total + '</div>' +
      '</div>';
  }).join('');
  renderHeat();
}
function calc() {
  const state = getRoundState();
  playerScoreEl.textContent = '閒 ' + (state.playerTotal === null ? 0 : state.playerTotal);
  bankerScoreEl.textContent = '莊 ' + (state.bankerTotal === null ? 0 : state.bankerTotal);
  const winnerText = state.actual === '閒' ? '閒贏' : state.actual === '莊' ? '莊贏' : '和局';
  winnerTextEl.textContent = winnerText;
  winnerTextEl.className = 'winner-text ' + getWinnerTextClass(winnerText);
  detailTextEl.textContent = state.info;
  renderPredict(state);
  renderStats();
}
function highlight() {
  cells.forEach(function (c) { c.classList.remove('active'); });
  if (selectedIndex !== null) {
    const target = document.querySelector("[data-index='" + selectedIndex + "']");
    if (target) target.classList.add('active');
  }
}
function renderHistory() {
  const currentState = getRoundState();
  const liveItems = [];
  if (pendingPrediction) {
    const hasAnyCurrentCard = currentState.playerCards.length > 0 || currentState.bankerCards.length > 0;
    const liveActual = currentState.playerCards.length >= 2 && currentState.bankerCards.length >= 2 ? currentState.actual : '-';
    const liveMStatus = liveActual === '-' ? '-' : getHistoryStatus(pendingPrediction.mPick, liveActual);
    const liveTStatus = liveActual === '-' ? '-' : getHistoryStatus(pendingPrediction.tPick, liveActual);
    const liveRStatus = liveActual === '-' ? '-' : getHistoryStatus(pendingPrediction.rPick, liveActual);
    if (hasAnyCurrentCard) {
      liveItems.push({
        sourceRound: pendingPrediction.sourceRound,
        targetRound: pendingPrediction.targetRound,
        player: currentState.playerCards.join(' '),
        banker: currentState.bankerCards.join(' '),
        actual: liveActual,
        mPick: pendingPrediction.mPick,
        tPick: pendingPrediction.tPick,
        rPick: pendingPrediction.rPick,
        mStatus: liveMStatus,
        tStatus: liveTStatus,
        rStatus: liveRStatus,
        isLive: true
      });
    }
  }
  const allItems = liveItems.concat(historyData);
  if (allItems.length === 0) {
    historyListEl.innerHTML = '<div class="history-empty">目前還沒有歷史紀錄</div>';
    return;
  }
  historyListEl.innerHTML = allItems.map(function (item) {
    const mCls = item.mStatus === '準' ? 'status-hit' : item.mStatus === '失敗' ? 'status-miss' : 'status-draw';
    const tCls = item.tStatus === '準' ? 'status-hit' : item.tStatus === '失敗' ? 'status-miss' : 'status-draw';
    const rCls = item.rStatus === '準' ? 'status-hit' : item.rStatus === '失敗' ? 'status-miss' : 'status-draw';
    const actualClass = item.actual === '和' ? 'draw' : item.actual === '閒' ? 'hit' : item.actual === '莊' ? 'miss' : '';
    const roundText = item.sourceRound && item.targetRound
      ? '<div style="font-size:12px;color:#64748b;margin-bottom:4px;">第' + item.sourceRound + '局預測第' + item.targetRound + '局' + (item.isLive ? '（進行中）' : '') + '</div>'
      : '';
    const actualText = item.actual === '-' ? '實際：待開' : '實際：' + item.actual;
    return '<div class="history-item">' +
      roundText +
      '<div class="history-top">' +
        '<div class="history-main">' +
          '<div class="history-cards">' +
            '<div><strong>閒牌面：</strong>' + (item.player || '-') + '</div>' +
            '<div><strong>莊牌面：</strong>' + (item.banker || '-') + '</div>' +
          '</div>' +
          '<div class="history-smr">' +
            '<div><strong>M：</strong>' + item.mPick + '（<span class="' + mCls + '">' + item.mStatus + '</span>）</div>' +
            '<div><strong>T：</strong>' + item.tPick + '（<span class="' + tCls + '">' + item.tStatus + '</span>）</div>' +
            '<div><strong>R：</strong>' + item.rPick + '（<span class="' + rCls + '">' + item.rStatus + '</span>）</div>' +
          '</div>' +
        '</div>' +
        '<div class="history-result ' + actualClass + '">' + actualText + '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}
function render() {
  cells.forEach(function (cell) {
    const idx = parseInt(cell.dataset.index, 10);
    const val = values[idx];
    cell.textContent = val;
    if (val) cell.classList.remove('empty');
    else cell.classList.add('empty');
  });
  highlight();
  calc();
  saveToStorage();
}
function inputCard(card) {
  if (selectedIndex !== null) {
    values[selectedIndex] = card;
    selectedIndex = null;
  } else if (currentStep < 6) {
    values[order[currentStep]] = card;
    currentStep += 1;
  }
  render();
  renderHistory();
}
function skip() {
  if (selectedIndex !== null) {
    values[selectedIndex] = '';
    selectedIndex = null;
    render();
    renderHistory();
    return;
  }
  if (currentStep < 6) {
    currentStep += 1;
    render();
    renderHistory();
  }
}
function keepPendingOnScreen() {
  if (!pendingPrediction) return;
  linePredictEl.innerHTML = colorPick('M', pendingPrediction.mPick) + '　' + colorPick('T', pendingPrediction.tPick) + '　' + colorPick('R', pendingPrediction.rPick);
  linePredictMetaEl.textContent = formatPredictMeta(pendingPrediction.mMeta, pendingPrediction.tMeta, pendingPrediction.rMeta);
}
function saveRoundAndNext() {
  const state = getRoundState();
  const roundNo = getRoundNumber();
  if (!roundNo) {
    alert('請先輸入局數。');
    roundInputEl.focus();
    return;
  }
  if (state.playerCards.length < 2 || state.bankerCards.length < 2) {
    alert('請至少先輸入閒家與莊家的前兩張牌。');
    return;
  }
  if (pendingPrediction) {
    historyData.unshift({
      sourceRound: pendingPrediction.sourceRound,
      targetRound: pendingPrediction.targetRound,
      player: state.playerCards.join(' '),
      banker: state.bankerCards.join(' '),
      actual: state.actual,
      mPick: pendingPrediction.mPick,
      tPick: pendingPrediction.tPick,
      rPick: pendingPrediction.rPick,
      mStatus: getHistoryStatus(pendingPrediction.mPick, state.actual),
      tStatus: getHistoryStatus(pendingPrediction.tPick, state.actual),
      rStatus: getHistoryStatus(pendingPrediction.rPick, state.actual)
    });
    if (historyData.length > 100) historyData = historyData.slice(0,100);
  }
  pendingPrediction = {
    sourceRound: roundNo,
    targetRound: roundNo + 1,
    mPick: String(state.m.pick),
    tPick: String(state.t.pick),
    rPick: String(state.r.pick),
    mMeta: state.m.meta,
    tMeta: state.t.meta,
    rMeta: state.r.meta
  };
  roundInputEl.value = String(roundNo + 1);
  values = ['', '', '', '', '', ''];
  currentStep = 0;
  selectedIndex = null;
  playerScoreEl.textContent = '閒 0';
  bankerScoreEl.textContent = '莊 0';
  winnerTextEl.textContent = '和局';
  winnerTextEl.className = 'winner-text winner-tie';
  detailTextEl.textContent = '請依序輸入牌面';
  render();
  keepPendingOnScreen();
  renderHistory();
  saveToStorage();
}
function clearHistory() {
  historyData = [];
  pendingPrediction = null;
  renderHistory();
  saveToStorage();
  calc();
}
function clearBoard() {
  values = ['', '', '', '', '', ''];
  currentStep = 0;
  selectedIndex = null;
  render();
  keepPendingOnScreen();
  renderHistory();
}
cells.forEach(function (cell) {
  cell.addEventListener('click', function () {
    selectedIndex = parseInt(cell.dataset.index, 10);
    highlight();
    saveToStorage();
  }, { passive: true });
});
roundInputEl.addEventListener('input', function () {
  calc();
  keepPendingOnScreen();
  renderHistory();
  saveToStorage();
}, { passive: true });
cardButtonsEl.addEventListener('click', function (e) {
  const btn = e.target.closest('[data-card]');
  if (!btn) return;
  inputCard(btn.dataset.card);
});
skipBtn.addEventListener('click', skip);
nextBtn.addEventListener('click', saveRoundAndNext);
clearBoardBtn.addEventListener('click', clearBoard);
clearHistoryBtn.addEventListener('click', clearHistory);

loadFromStorage();
render();
renderHistory();
keepPendingOnScreen();
})();
</script>
